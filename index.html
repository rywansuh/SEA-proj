<!doctype html>
<html>
  <head>
    <title>Sports Legends Catalog</title>
    <meta charset="UTF-8" />
    <meta name="description" content="Top 20 players across NBA, NFL, and MLB" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

    <script src="scripts.js"></script>
  </head>

  <body>

    <!-- HEADER -->
    <header class="main-header">
      <div class="header-inner">
        <div class="header-text">
          <h1 class="site-title">SPORTS<br>LEGENDS</h1>
          <p class="site-subtitle">Top 20 players across NBA · NFL · MLB</p>
        </div>
        <div class="header-stats" id="header-stats"></div>
      </div>
    </header>

    <!-- SPORT TABS -->
    <div class="tabs-bar">
      <button class="tab-btn active" data-sport="NBA" onclick="switcher('NBA')">🏀 NBA</button>
      <button class="tab-btn"        data-sport="NFL" onclick="switcher('NFL')">🏈 NFL</button>
      <button class="tab-btn"        data-sport="MLB" onclick="switcher('MLB')">⚾ MLB</button>
    </div>

    <!-- SEARCH + ADD -->
    <div class="controls-bar">
      <input type="text" id="search" placeholder="Search by name or team…" oninput="whensearch()" />
      <button class="btn-add" onclick="modaopen()">+ Add Player</button>
    </div>

    <div class="results-label" id="results-label"></div>

    <!-- PLAYER TABLE -->
    <main class="table-wrap">
      <table class="player-table">
        <thead>
          <tr id="stat-headers">
            <th class="th-avatar"></th>
            <th class="th-name">Player</th>
            <!-- Stat <th> cells are injected here by renderStatHeaders() in scripts.js -->
          </tr>
        </thead>
        <tbody id="card-container"></tbody>
      </table>
    </main>

    <!-- Hidden template card (required by starter code) -->
    <div class="card" style="display:none;">
      <div class="card-content">
        <h2>Player Name</h2>
        <img src="" alt="Player" />
        <ul><li>Position</li><li>Team</li><li>Stats</li></ul>
      </div>
    </div>



    <!-- ADD PLAYER MODAL -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="whenclicker(event)">
      <div class="modal" role="dialog" aria-modal="true">
        <h2 id="modal-sport-label">Add Player</h2>

        <div class="form-row-2">
          <div class="form-field">
            <label for="f-name">Full Name <span class="req">*</span></label>
            <input type="text" id="f-name" placeholder="e.g. LeBron James" />
          </div>
          <div class="form-field">
            <label for="f-team">Team <span class="req">*</span></label>
            <input type="text" id="f-team" placeholder="e.g. Lakers" />
          </div>
        </div>

        <div class="form-row-2">
          <div class="form-field">
            <label for="f-pos">Position</label>
            <select id="f-pos"></select>
          </div>
          <div class="form-field">
            <label for="f-age">Age</label>
            <input type="number" id="f-age" placeholder="27" min="18" max="50" />
          </div>
        </div>

        <!-- Stat inputs rebuilt by JS for each sport -->
        <div class="stats-grid" id="stat-fields"></div>

        <!-- NFL-only custom stat label row -->
        <div id="nfl-label-fields" style="display:none;"></div>

        <p id="form-error" class="form-error" style="display:none;"></p>

        <div class="modal-actions">
          <button class="btn-primary" onclick="addp()">Add Player</button>
          <button class="btn-cancel"  onclick="modaclose()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Kick off the async data load once the page is ready -->
    <script>
      load();
    </script>
  </body>
</html>
